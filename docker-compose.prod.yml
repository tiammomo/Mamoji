name: ${MAMOJI_COMPOSE_PROJECT_NAME:-mamoji-prod}

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: ${MAMOJI_LOG_MAX_SIZE:-20m}
    max-file: ${MAMOJI_LOG_MAX_FILES:-5}

services:
  caddy:
    image: caddy:${MAMOJI_CADDY_VERSION:-2.11.4-alpine}
    restart: unless-stopped
    init: true
    stop_grace_period: ${MAMOJI_CADDY_STOP_GRACE_PERIOD:-20s}
    cpus: "${MAMOJI_CADDY_CPUS:-0.50}"
    mem_limit: ${MAMOJI_CADDY_MEMORY_LIMIT:-256m}
    pids_limit: ${MAMOJI_CADDY_PIDS_LIMIT:-128}
    logging: *default-logging
    environment:
      MAMOJI_PUBLIC_HOST: ${MAMOJI_PUBLIC_HOST:?MAMOJI_PUBLIC_HOST is required}
      MAMOJI_TLS_EMAIL: ${MAMOJI_TLS_EMAIL:?MAMOJI_TLS_EMAIL is required}
      MAMOJI_MINIO_BUCKET: ${MAMOJI_MINIO_BUCKET:-mamoji}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - mamoji-caddy-data:/data
      - mamoji-caddy-config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: mamoji-backend:prod
    restart: unless-stopped
    init: true
    stop_grace_period: ${MAMOJI_BACKEND_STOP_GRACE_PERIOD:-45s}
    cpus: "${MAMOJI_BACKEND_CPUS:-2.0}"
    mem_limit: ${MAMOJI_BACKEND_MEMORY_LIMIT:-1536m}
    pids_limit: ${MAMOJI_BACKEND_PIDS_LIMIT:-256}
    logging: *default-logging
    environment:
      JAVA_TOOL_OPTIONS: "${MAMOJI_JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=20.0 -XX:MaxRAMPercentage=70.0 -XX:+ExitOnOutOfMemoryError}"
      MAMOJI_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${MAMOJI_POSTGRES_DB:?MAMOJI_POSTGRES_DB is required}
      MAMOJI_DATASOURCE_USERNAME: ${MAMOJI_POSTGRES_USER:?MAMOJI_POSTGRES_USER is required}
      MAMOJI_DATASOURCE_PASSWORD: ${MAMOJI_POSTGRES_PASSWORD:?MAMOJI_POSTGRES_PASSWORD is required}
      MAMOJI_RUNTIME_ENVIRONMENT: ${MAMOJI_RUNTIME_ENVIRONMENT:-production}
      MAMOJI_SINGLE_INSTANCE_GUARD_ENABLED: "true"
      MAMOJI_SCHEMA_COMPATIBILITY_ENABLED: ${MAMOJI_SCHEMA_COMPATIBILITY_ENABLED:-false}
      MAMOJI_DB_POOL_MAX_SIZE: ${MAMOJI_DB_POOL_MAX_SIZE:-20}
      MAMOJI_DB_POOL_MIN_IDLE: ${MAMOJI_DB_POOL_MIN_IDLE:-4}
      MAMOJI_DB_POOL_CONNECTION_TIMEOUT_MS: ${MAMOJI_DB_POOL_CONNECTION_TIMEOUT_MS:-5000}
      MAMOJI_DB_POOL_VALIDATION_TIMEOUT_MS: ${MAMOJI_DB_POOL_VALIDATION_TIMEOUT_MS:-2000}
      MAMOJI_DB_POOL_IDLE_TIMEOUT_MS: ${MAMOJI_DB_POOL_IDLE_TIMEOUT_MS:-600000}
      MAMOJI_DB_POOL_MAX_LIFETIME_MS: ${MAMOJI_DB_POOL_MAX_LIFETIME_MS:-1800000}
      MAMOJI_DB_POOL_KEEPALIVE_MS: ${MAMOJI_DB_POOL_KEEPALIVE_MS:-120000}
      MAMOJI_DB_POOL_LEAK_DETECTION_MS: ${MAMOJI_DB_POOL_LEAK_DETECTION_MS:-0}
      MAMOJI_DB_CONNECT_TIMEOUT_SECONDS: ${MAMOJI_DB_CONNECT_TIMEOUT_SECONDS:-5}
      MAMOJI_DB_SOCKET_TIMEOUT_SECONDS: ${MAMOJI_DB_SOCKET_TIMEOUT_SECONDS:-30}
      MAMOJI_HTTP_CONNECTION_TIMEOUT: ${MAMOJI_HTTP_CONNECTION_TIMEOUT:-5s}
      MAMOJI_HTTP_KEEP_ALIVE_TIMEOUT: ${MAMOJI_HTTP_KEEP_ALIVE_TIMEOUT:-20s}
      MAMOJI_HTTP_MAX_KEEP_ALIVE_REQUESTS: ${MAMOJI_HTTP_MAX_KEEP_ALIVE_REQUESTS:-100}
      MAMOJI_HTTP_MAX_CONNECTIONS: ${MAMOJI_HTTP_MAX_CONNECTIONS:-4096}
      MAMOJI_HTTP_ACCEPT_COUNT: ${MAMOJI_HTTP_ACCEPT_COUNT:-100}
      MAMOJI_HTTP_MAX_THREADS: ${MAMOJI_HTTP_MAX_THREADS:-100}
      MAMOJI_HTTP_MIN_SPARE_THREADS: ${MAMOJI_HTTP_MIN_SPARE_THREADS:-10}
      MAMOJI_SHUTDOWN_TIMEOUT: ${MAMOJI_SHUTDOWN_TIMEOUT:-30s}
      MAMOJI_BOOTSTRAP_MODE: ${MAMOJI_BOOTSTRAP_MODE:-bootstrap}
      MAMOJI_BOOTSTRAP_ADMIN_EMAIL: ${MAMOJI_BOOTSTRAP_ADMIN_EMAIL:?MAMOJI_BOOTSTRAP_ADMIN_EMAIL is required}
      MAMOJI_BOOTSTRAP_ADMIN_PASSWORD: ${MAMOJI_BOOTSTRAP_ADMIN_PASSWORD:?MAMOJI_BOOTSTRAP_ADMIN_PASSWORD is required}
      MAMOJI_BOOTSTRAP_ADMIN_NICKNAME: ${MAMOJI_BOOTSTRAP_ADMIN_NICKNAME:-系统管理员}
      MAMOJI_BOOTSTRAP_COMPANY_NAME: ${MAMOJI_BOOTSTRAP_COMPANY_NAME:?MAMOJI_BOOTSTRAP_COMPANY_NAME is required}
      MAMOJI_BOOTSTRAP_COMPANY_CREDIT_CODE: ${MAMOJI_BOOTSTRAP_COMPANY_CREDIT_CODE:-}
      MAMOJI_BOOTSTRAP_COMPANY_INDUSTRY: ${MAMOJI_BOOTSTRAP_COMPANY_INDUSTRY:-未设置}
      MAMOJI_BOOTSTRAP_COMPANY_TAXPAYER_TYPE: ${MAMOJI_BOOTSTRAP_COMPANY_TAXPAYER_TYPE:-未设置}
      MAMOJI_BOOTSTRAP_COMPANY_CURRENCY: ${MAMOJI_BOOTSTRAP_COMPANY_CURRENCY:-CNY}
      MAMOJI_FLYWAY_ENABLED: ${MAMOJI_FLYWAY_ENABLED:-true}
      MAMOJI_REGISTRATION_MODE: ${MAMOJI_REGISTRATION_MODE:-invite}
      MAMOJI_ALLOWED_ORIGINS: ${MAMOJI_ALLOWED_ORIGINS:?MAMOJI_ALLOWED_ORIGINS is required}
      MAMOJI_AUTH_MAX_FAILED_ATTEMPTS: ${MAMOJI_AUTH_MAX_FAILED_ATTEMPTS:-5}
      MAMOJI_AUTH_MAX_FAILED_ATTEMPTS_PER_SOURCE: ${MAMOJI_AUTH_MAX_FAILED_ATTEMPTS_PER_SOURCE:-50}
      MAMOJI_AUTH_FAILURE_WINDOW_MINUTES: ${MAMOJI_AUTH_FAILURE_WINDOW_MINUTES:-15}
      MAMOJI_AUTH_LOCK_MINUTES: ${MAMOJI_AUTH_LOCK_MINUTES:-15}
      MAMOJI_PASSWORD_MIN_LENGTH: ${MAMOJI_PASSWORD_MIN_LENGTH:-12}
      MAMOJI_PASSWORD_REQUIRE_COMPLEXITY: ${MAMOJI_PASSWORD_REQUIRE_COMPLEXITY:-true}
      MAMOJI_OUTBOX_ENABLED: ${MAMOJI_OUTBOX_ENABLED:-true}
      MAMOJI_OUTBOX_CONSUMER_ENABLED: ${MAMOJI_OUTBOX_CONSUMER_ENABLED:-true}
      MAMOJI_OUTBOX_CONSUMER_FIXED_DELAY_MS: ${MAMOJI_OUTBOX_CONSUMER_FIXED_DELAY_MS:-5000}
      MAMOJI_OUTBOX_CONSUMER_BATCH_SIZE: ${MAMOJI_OUTBOX_CONSUMER_BATCH_SIZE:-20}
      MAMOJI_OUTBOX_CONSUMER_MAX_ATTEMPTS: ${MAMOJI_OUTBOX_CONSUMER_MAX_ATTEMPTS:-8}
      MAMOJI_OUTBOX_CONSUMER_STALE_LOCK_MINUTES: ${MAMOJI_OUTBOX_CONSUMER_STALE_LOCK_MINUTES:-10}
      MAMOJI_NOTIFICATIONS_ENABLED: ${MAMOJI_NOTIFICATIONS_ENABLED:-true}
      MAMOJI_NOTIFICATION_REMINDERS_ENABLED: ${MAMOJI_NOTIFICATION_REMINDERS_ENABLED:-true}
      MAMOJI_NOTIFICATION_REMINDER_FIXED_DELAY_MS: ${MAMOJI_NOTIFICATION_REMINDER_FIXED_DELAY_MS:-60000}
      MAMOJI_NOTIFICATION_TAX_LOOKAHEAD_DAYS: ${MAMOJI_NOTIFICATION_TAX_LOOKAHEAD_DAYS:-7}
      MAMOJI_NOTIFICATION_PEOPLE_LOOKAHEAD_DAYS: ${MAMOJI_NOTIFICATION_PEOPLE_LOOKAHEAD_DAYS:-14}
      MAMOJI_NOTIFICATION_RECEIPT_LOOKAHEAD_DAYS: ${MAMOJI_NOTIFICATION_RECEIPT_LOOKAHEAD_DAYS:-7}
      MAMOJI_NOTIFICATION_DELIVERY_ENABLED: ${MAMOJI_NOTIFICATION_DELIVERY_ENABLED:-true}
      MAMOJI_NOTIFICATION_DELIVERY_FIXED_DELAY_MS: ${MAMOJI_NOTIFICATION_DELIVERY_FIXED_DELAY_MS:-10000}
      MAMOJI_NOTIFICATION_DELIVERY_BATCH_SIZE: ${MAMOJI_NOTIFICATION_DELIVERY_BATCH_SIZE:-20}
      MAMOJI_NOTIFICATION_DELIVERY_MAX_ATTEMPTS: ${MAMOJI_NOTIFICATION_DELIVERY_MAX_ATTEMPTS:-6}
      MAMOJI_NOTIFICATION_DELIVERY_STALE_LOCK_MINUTES: ${MAMOJI_NOTIFICATION_DELIVERY_STALE_LOCK_MINUTES:-10}
      MAMOJI_NOTIFICATION_DELIVERY_TIMEOUT_SECONDS: ${MAMOJI_NOTIFICATION_DELIVERY_TIMEOUT_SECONDS:-5}
      MAMOJI_OBJECT_STORAGE_ENABLED: "true"
      MAMOJI_MINIO_ENDPOINT: http://minio:9000
      MAMOJI_MINIO_ACCESS_KEY: ${MAMOJI_MINIO_ACCESS_KEY:?MAMOJI_MINIO_ACCESS_KEY is required}
      MAMOJI_MINIO_SECRET_KEY: ${MAMOJI_MINIO_SECRET_KEY:?MAMOJI_MINIO_SECRET_KEY is required}
      MAMOJI_MINIO_BUCKET: ${MAMOJI_MINIO_BUCKET:-mamoji}
      MAMOJI_MINIO_REGION: ${MAMOJI_MINIO_REGION:-us-east-1}
      MAMOJI_MINIO_EXTERNAL_URL: ${MAMOJI_MINIO_EXTERNAL_URL:?MAMOJI_MINIO_EXTERNAL_URL is required}
      MAMOJI_MINIO_PRESIGNED_URL_EXPIRY_SECONDS: ${MAMOJI_MINIO_PRESIGNED_URL_EXPIRY_SECONDS:-600}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:38080/actuator/health/readiness"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${MAMOJI_PUBLIC_API_BASE_URL:?MAMOJI_PUBLIC_API_BASE_URL is required}
        NEXT_PUBLIC_SHOW_DEMO_CREDENTIALS: "false"
    image: mamoji-frontend:prod
    restart: unless-stopped
    init: true
    stop_grace_period: ${MAMOJI_FRONTEND_STOP_GRACE_PERIOD:-30s}
    cpus: "${MAMOJI_FRONTEND_CPUS:-1.0}"
    mem_limit: ${MAMOJI_FRONTEND_MEMORY_LIMIT:-768m}
    pids_limit: ${MAMOJI_FRONTEND_PIDS_LIMIT:-256}
    logging: *default-logging
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${MAMOJI_PUBLIC_API_BASE_URL:?MAMOJI_PUBLIC_API_BASE_URL is required}
      NEXT_PUBLIC_SHOW_DEMO_CREDENTIALS: "false"
      HOSTNAME: 0.0.0.0
      PORT: 33000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:33000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 12

  postgres:
    image: postgres:18.4-alpine
    restart: unless-stopped
    init: true
    stop_grace_period: ${MAMOJI_POSTGRES_STOP_GRACE_PERIOD:-60s}
    cpus: "${MAMOJI_POSTGRES_CPUS:-2.0}"
    mem_limit: ${MAMOJI_POSTGRES_MEMORY_LIMIT:-2g}
    pids_limit: ${MAMOJI_POSTGRES_PIDS_LIMIT:-256}
    shm_size: ${MAMOJI_POSTGRES_SHM_SIZE:-256m}
    logging: *default-logging
    environment:
      POSTGRES_DB: ${MAMOJI_POSTGRES_DB:?MAMOJI_POSTGRES_DB is required}
      POSTGRES_USER: ${MAMOJI_POSTGRES_USER:?MAMOJI_POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${MAMOJI_POSTGRES_PASSWORD:?MAMOJI_POSTGRES_PASSWORD is required}
    volumes:
      - mamoji-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 12

  minio:
    image: quay.io/minio/minio:${MAMOJI_MINIO_VERSION:-RELEASE.2025-09-07T16-13-09Z}
    restart: unless-stopped
    init: true
    stop_grace_period: ${MAMOJI_MINIO_STOP_GRACE_PERIOD:-30s}
    cpus: "${MAMOJI_MINIO_CPUS:-1.0}"
    mem_limit: ${MAMOJI_MINIO_MEMORY_LIMIT:-1g}
    pids_limit: ${MAMOJI_MINIO_PIDS_LIMIT:-256}
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MAMOJI_MINIO_ACCESS_KEY:?MAMOJI_MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MAMOJI_MINIO_SECRET_KEY:?MAMOJI_MINIO_SECRET_KEY is required}
    volumes:
      - mamoji-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 12

  prometheus:
    image: prom/prometheus:${MAMOJI_PROMETHEUS_VERSION:-v3.12.0}
    restart: unless-stopped
    init: true
    stop_grace_period: ${MAMOJI_PROMETHEUS_STOP_GRACE_PERIOD:-30s}
    cpus: "${MAMOJI_PROMETHEUS_CPUS:-1.0}"
    mem_limit: ${MAMOJI_PROMETHEUS_MEMORY_LIMIT:-1g}
    pids_limit: ${MAMOJI_PROMETHEUS_PIDS_LIMIT:-256}
    logging: *default-logging
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "${MAMOJI_PROMETHEUS_PORT:-127.0.0.1:39090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - mamoji-prometheus-data:/prometheus
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mamoji-caddy-data:
  mamoji-caddy-config:
  mamoji-postgres-data:
  mamoji-minio-data:
  mamoji-prometheus-data:
