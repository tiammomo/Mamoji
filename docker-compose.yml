services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: mamoji-backend:local
    environment:
      MAMOJI_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${MAMOJI_POSTGRES_DB:-mamoji}
      MAMOJI_DATASOURCE_USERNAME: ${MAMOJI_POSTGRES_USER:-mamoji}
      MAMOJI_DATASOURCE_PASSWORD: ${MAMOJI_POSTGRES_PASSWORD:-mamoji}
      MAMOJI_OBJECT_STORAGE_ENABLED: "true"
      MAMOJI_MINIO_ENDPOINT: http://minio:9000
      MAMOJI_MINIO_ACCESS_KEY: ${MAMOJI_MINIO_ACCESS_KEY:-minioadmin}
      MAMOJI_MINIO_SECRET_KEY: ${MAMOJI_MINIO_SECRET_KEY:-minioadmin}
      MAMOJI_MINIO_BUCKET: ${MAMOJI_MINIO_BUCKET:-mamoji}
      MAMOJI_MINIO_REGION: ${MAMOJI_MINIO_REGION:-us-east-1}
      MAMOJI_MINIO_EXTERNAL_URL: ${MAMOJI_MINIO_EXTERNAL_URL:-http://localhost:39080}
      MAMOJI_MINIO_PRESIGNED_URL_EXPIRY_SECONDS: ${MAMOJI_MINIO_PRESIGNED_URL_EXPIRY_SECONDS:-600}
    ports:
      - "${MAMOJI_BACKEND_PORT:-38080}:38080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:38080/actuator/health"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 12

  minio:
    image: quay.io/minio/minio:${MAMOJI_MINIO_VERSION:-latest}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MAMOJI_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MAMOJI_MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MAMOJI_MINIO_API_PORT:-39080}:9000"
      - "${MAMOJI_MINIO_CONSOLE_PORT:-39081}:9001"
    volumes:
      - mamoji-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 12

  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: ${MAMOJI_POSTGRES_DB:-mamoji}
      POSTGRES_USER: ${MAMOJI_POSTGRES_USER:-mamoji}
      POSTGRES_PASSWORD: ${MAMOJI_POSTGRES_PASSWORD:-mamoji}
    volumes:
      - mamoji-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:38080/api/v1}
    image: mamoji-frontend:local
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:38080/api/v1}
      HOSTNAME: 0.0.0.0
      PORT: 33000
    ports:
      - "${MAMOJI_FRONTEND_PORT:-33000}:33000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:33000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 12

volumes:
  mamoji-minio-data:
  mamoji-postgres-data:
