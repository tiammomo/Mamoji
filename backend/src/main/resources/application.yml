server:
  port: 38080
  compression:
    enabled: true
    min-response-size: 1KB
    mime-types: application/json,text/plain,text/html,text/css,application/javascript

debug: false

spring:
  application:
    name: mamoji-backend
  datasource:
    url: ${MAMOJI_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mamoji}
    username: ${MAMOJI_DATASOURCE_USERNAME:mamoji}
    password: ${MAMOJI_DATASOURCE_PASSWORD:mamoji}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${MAMOJI_DB_POOL_MAX_SIZE:10}
      minimum-idle: ${MAMOJI_DB_POOL_MIN_IDLE:2}
      initialization-fail-timeout: 30000
  flyway:
    enabled: ${MAMOJI_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

mamoji:
  runtime:
    environment: ${MAMOJI_RUNTIME_ENVIRONMENT:local}
  schema:
    compatibility-enabled: ${MAMOJI_SCHEMA_COMPATIBILITY_ENABLED:true}
  bootstrap:
    mode: ${MAMOJI_BOOTSTRAP_MODE:demo}
    admin-email: ${MAMOJI_BOOTSTRAP_ADMIN_EMAIL:test@mamoji.com}
    admin-password: ${MAMOJI_BOOTSTRAP_ADMIN_PASSWORD:123456}
    admin-nickname: ${MAMOJI_BOOTSTRAP_ADMIN_NICKNAME:Mamoji 公司管理员}
    company-name: ${MAMOJI_BOOTSTRAP_COMPANY_NAME:我的公司}
    company-credit-code: ${MAMOJI_BOOTSTRAP_COMPANY_CREDIT_CODE:}
    company-industry: ${MAMOJI_BOOTSTRAP_COMPANY_INDUSTRY:未设置}
    company-taxpayer-type: ${MAMOJI_BOOTSTRAP_COMPANY_TAXPAYER_TYPE:未设置}
    company-currency: ${MAMOJI_BOOTSTRAP_COMPANY_CURRENCY:CNY}
  registration:
    mode: ${MAMOJI_REGISTRATION_MODE:open}
  security:
    cors:
      allowed-origins: ${MAMOJI_ALLOWED_ORIGINS:http://localhost:33000,http://127.0.0.1:33000}
    auth:
      max-failed-attempts: ${MAMOJI_AUTH_MAX_FAILED_ATTEMPTS:5}
      max-failed-attempts-per-source: ${MAMOJI_AUTH_MAX_FAILED_ATTEMPTS_PER_SOURCE:50}
      failure-window-minutes: ${MAMOJI_AUTH_FAILURE_WINDOW_MINUTES:15}
      lock-minutes: ${MAMOJI_AUTH_LOCK_MINUTES:15}
    password:
      min-length: ${MAMOJI_PASSWORD_MIN_LENGTH:12}
      require-complexity: ${MAMOJI_PASSWORD_REQUIRE_COMPLEXITY:false}
  outbox:
    enabled: ${MAMOJI_OUTBOX_ENABLED:true}
    consumer:
      enabled: ${MAMOJI_OUTBOX_CONSUMER_ENABLED:true}
      fixed-delay-ms: ${MAMOJI_OUTBOX_CONSUMER_FIXED_DELAY_MS:5000}
      batch-size: ${MAMOJI_OUTBOX_CONSUMER_BATCH_SIZE:20}
      max-attempts: ${MAMOJI_OUTBOX_CONSUMER_MAX_ATTEMPTS:8}
      stale-lock-minutes: ${MAMOJI_OUTBOX_CONSUMER_STALE_LOCK_MINUTES:10}
  notifications:
    enabled: ${MAMOJI_NOTIFICATIONS_ENABLED:true}
    reminder:
      enabled: ${MAMOJI_NOTIFICATION_REMINDERS_ENABLED:true}
      fixed-delay-ms: ${MAMOJI_NOTIFICATION_REMINDER_FIXED_DELAY_MS:60000}
      tax-lookahead-days: ${MAMOJI_NOTIFICATION_TAX_LOOKAHEAD_DAYS:7}
      people-lookahead-days: ${MAMOJI_NOTIFICATION_PEOPLE_LOOKAHEAD_DAYS:14}
      receipt-lookahead-days: ${MAMOJI_NOTIFICATION_RECEIPT_LOOKAHEAD_DAYS:7}
    delivery:
      enabled: ${MAMOJI_NOTIFICATION_DELIVERY_ENABLED:true}
      fixed-delay-ms: ${MAMOJI_NOTIFICATION_DELIVERY_FIXED_DELAY_MS:10000}
      batch-size: ${MAMOJI_NOTIFICATION_DELIVERY_BATCH_SIZE:20}
      max-attempts: ${MAMOJI_NOTIFICATION_DELIVERY_MAX_ATTEMPTS:6}
      stale-lock-minutes: ${MAMOJI_NOTIFICATION_DELIVERY_STALE_LOCK_MINUTES:10}
      timeout-seconds: ${MAMOJI_NOTIFICATION_DELIVERY_TIMEOUT_SECONDS:5}
  object-storage:
    enabled: ${MAMOJI_OBJECT_STORAGE_ENABLED:false}
    provider: minio
    endpoint: ${MAMOJI_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MAMOJI_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MAMOJI_MINIO_SECRET_KEY:minioadmin}
    bucket: ${MAMOJI_MINIO_BUCKET:mamoji}
    external-url: ${MAMOJI_MINIO_EXTERNAL_URL:}
    presigned-url-expiry-seconds: ${MAMOJI_MINIO_PRESIGNED_URL_EXPIRY_SECONDS:600}

logging:
  level:
    root: INFO
