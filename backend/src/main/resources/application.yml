server:
  port: 38080
  compression:
    enabled: true
    min-response-size: 1KB
    mime-types: application/json,text/plain,text/html,text/css,application/javascript

debug: false

spring:
  application:
    name: mamoji-backend
  datasource:
    url: jdbc:sqlite:${MAMOJI_SQLITE_PATH:data/mamoji.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
      initialization-fail-timeout: -1
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
