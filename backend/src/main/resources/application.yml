server:
  port: 38080
  compression:
    enabled: true
    min-response-size: 1KB
    mime-types: application/json,text/plain,text/html,text/css,application/javascript

debug: false

spring:
  application:
    name: mamoji-backend
  datasource:
    url: jdbc:sqlite:${MAMOJI_SQLITE_PATH:data/mamoji.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
      initialization-fail-timeout: -1
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

mamoji:
  object-storage:
    enabled: ${MAMOJI_OBJECT_STORAGE_ENABLED:false}
    provider: minio
    endpoint: ${MAMOJI_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MAMOJI_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MAMOJI_MINIO_SECRET_KEY:minioadmin}
    bucket: ${MAMOJI_MINIO_BUCKET:mamoji}
    external-url: ${MAMOJI_MINIO_EXTERNAL_URL:}
    presigned-url-expiry-seconds: ${MAMOJI_MINIO_PRESIGNED_URL_EXPIRY_SECONDS:600}

logging:
  level:
    root: INFO
